<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QUEEN VENUS MD - QR SCANNER</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;800&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --gold: #FFD700;
      --gold-dark: #B8860B;
      --red-flame: #FF4500;
      --dark-bg: #050505;
      --glass-bg: rgba(15, 15, 15, 0.85);
      --glass-border: rgba(255, 215, 0, 0.5);
    }
    
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      background-color: var(--dark-bg);
      font-family: 'Poppins', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      color: #fff;
      overflow: hidden;
      background: radial-gradient(circle at top, #2D1000 0%, #000 80%);
    }

    /* Glow behind QR box */
    .glow-circle {
      position: absolute;
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(255,69,0,0.2) 0%, rgba(255,215,0,0.1) 40%, transparent 70%);
      z-index: 0;
      animation: pulseGlow 4s ease-in-out infinite alternate;
    }

    @keyframes pulseGlow {
      from { transform: scale(0.8); opacity: 0.5; }
      to { transform: scale(1.2); opacity: 1; }
    }

    .qr-container {
      position: relative;
      z-index: 10;
      background: var(--glass-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--glass-border);
      border-radius: 20px;
      padding: 40px;
      text-align: center;
      box-shadow: 0 20px 50px rgba(0,0,0,0.8), 0 0 30px rgba(255, 215, 0, 0.1) inset;
      width: 100%;
      max-width: 400px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    h2 {
      font-family: 'Cinzel', serif;
      color: var(--gold);
      font-size: 1.8rem;
      letter-spacing: 2px;
      margin-bottom: 5px;
      text-shadow: 0 0 10px rgba(255,215,0,0.3);
    }

    p {
      color: #aaa;
      font-size: 0.9rem;
      margin-bottom: 25px;
    }

    .qr-wrapper {
      position: relative;
      padding: 10px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 15px;
      border: 1px solid rgba(255,215,0,0.2);
      margin-bottom: 25px;
      width: 220px;
      height: 220px;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    .qr-wrapper::before {
      content: '';
      position: absolute;
      top: -50%; left: -50%;
      width: 200%; height: 200%;
      background: conic-gradient(transparent, transparent, transparent, var(--gold));
      animation: rotateBorder 4s linear infinite;
      z-index: -1;
    }
    .qr-wrapper::after {
      content: '';
      position: absolute;
      inset: 3px;
      background: var(--dark-bg);
      border-radius: 12px;
      z-index: -1;
    }

    @keyframes rotateBorder {
      100% { transform: rotate(360deg); }
    }

    #qr-image {
      width: 100%;
      height: 100%;
      border-radius: 10px;
      object-fit: contain;
      background: white; 
      padding: 10px;
    }

    progress {
      width: 100%;
      height: 8px;
      border-radius: 4px;
      overflow: hidden;
      appearance: none;
      -webkit-appearance: none;
      background: rgba(255, 255, 255, 0.1);
      margin-bottom: 25px;
    }
    
    progress::-webkit-progress-bar {
      background: rgba(255, 255, 255, 0.1);
    }
    
    progress::-webkit-progress-value {
      background: linear-gradient(90deg, var(--gold-dark), var(--gold));
      box-shadow: 0 0 10px var(--gold);
      transition: width 1s linear;
    }

    .reload-btn {
      display: inline-block;
      padding: 12px 30px;
      background: transparent;
      color: var(--gold);
      text-transform: uppercase;
      font-weight: 600;
      letter-spacing: 1px;
      border: 1px solid var(--gold);
      border-radius: 25px;
      text-decoration: none;
      transition: all 0.3s ease;
      cursor: pointer;
    }

    .reload-btn:hover {
      background: var(--gold);
      color: #000;
      box-shadow: 0 0 15px rgba(255, 215, 0, 0.5);
    }

    .copyright {
      position: absolute;
      bottom: 20px;
      width: 100%;
      text-align: center;
      font-family: 'Cinzel', serif;
      color: rgba(255, 255, 255, 0.3);
      font-size: 0.8rem;
    }
  </style>
  <script>
    window.onload = function() {
      let timeleft = 30;
      let pgBar = document.getElementById("progressBar");
      let qrImg = document.getElementById("qr-image");
      let statusText = document.getElementById("status");

      let downloadTimer = setInterval(function () {
        if (timeleft <= 0) {
          clearInterval(downloadTimer);
          if(pgBar) pgBar.value = 30; 
          qrImg.style.opacity = "0.2";
          document.getElementById("title-text").innerText = "QR EXPIRED";
          document.getElementById("title-text").style.color = "var(--red-flame)";
          statusText.innerText = "Please reload the page to get a new code.";
        } else {
          if(pgBar) pgBar.value = 30 - timeleft;
        }
        timeleft -= 1;
      }, 1000);
    }
  </script>
</head>
<body>
  <div class="glow-circle"></div>
  
  <div class="qr-container">
    <h2 id="title-text">SCAN QR CODE</h2>
    <p id="status">Link your device to Queen Venus MD</p>
    
    <div class="qr-wrapper">
      <img id="qr-image" src="/server" alt="QR CODE">
    </div>
    
    <progress value="0" max="30" id="progressBar"></progress>
    
    <a href="javascript:history.go(0)" class="reload-btn">Reload Page</a>
  </div>

  <div class="copyright">Copyright © 2026 Hansaka P. Fernando.</div>
</body>
</html>
