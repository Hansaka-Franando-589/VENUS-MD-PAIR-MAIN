<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QUEEN VENUS MD - PAIR CODE</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;800&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --gold: #FFD700;
      --gold-dark: #B8860B;
      --red-flame: #FF4500;
      --dark-bg: #0A0A0A;
      --glass-bg: rgba(10, 10, 10, 0.7);
      --glass-border: rgba(255, 215, 0, 0.4);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Poppins', sans-serif;
      background-color: var(--dark-bg);
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      overflow: hidden;
    }
    .background {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: radial-gradient(circle at center, #3a1000 0%, #050505 70%);
      z-index: -2;
    }
    .particles {
      position: absolute;
      width: 100%; height: 100%;
      background-image: radial-gradient(var(--gold) 1px, transparent 1px);
      background-size: 50px 50px;
      opacity: 0.15;
      animation: moveParticles 20s linear infinite;
      z-index: -1;
    }
    @keyframes moveParticles {
      from { transform: translateY(0); }
      to { transform: translateY(-50px); }
    }
    .container {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 480px;
      padding: 40px 20px;
    }
    .glass-box {
      background: var(--glass-bg);
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      border: 1px solid var(--glass-border);
      border-radius: 20px;
      padding: 50px 40px;
      box-shadow: 0 15px 35px rgba(0,0,0,0.8), inset 0 0 20px rgba(255, 215, 0, 0.08);
      text-align: center;
      animation: float 6s ease-in-out infinite;
    }
    @keyframes float {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-10px); }
      100% { transform: translateY(0px); }
    }
    h2 {
      font-family: 'Cinzel', serif;
      color: var(--gold);
      font-size: 2.2rem;
      margin-bottom: 10px;
      letter-spacing: 2px;
      text-shadow: 0 0 15px rgba(255, 215, 0, 0.4);
    }
    p.subtitle {
      color: #ddd;
      font-size: 0.95rem;
      margin-bottom: 35px;
    }
    .input-group {
      display: flex;
      flex-direction: column;
      gap: 20px;
      margin-bottom: 25px;
    }
    input[type="text"], input[type="number"] {
      width: 100%;
      padding: 16px 20px;
      background: rgba(0, 0, 0, 0.7);
      border: 1px solid var(--glass-border);
      border-radius: 12px;
      color: var(--gold);
      font-size: 1.2rem;
      font-family: 'Poppins', sans-serif;
      text-align: center;
      outline: none;
      transition: all 0.3s ease;
      letter-spacing: 2px;
    }
    input[type="text"]:focus, input[type="number"]:focus {
      border-color: var(--gold);
      box-shadow: 0 0 20px rgba(255, 215, 0, 0.3);
      background: rgba(0, 0, 0, 0.9);
    }
    input::placeholder {
      color: rgba(255, 255, 255, 0.2);
      letter-spacing: 1px;
    }
    input::-webkit-outer-spin-button,
    input::-webkit-inner-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }
    button {
      width: 100%;
      padding: 16px;
      background: linear-gradient(45deg, var(--gold-dark), var(--gold));
      border: none;
      border-radius: 12px;
      color: #000;
      font-family: 'Poppins', sans-serif;
      font-weight: 800;
      font-size: 1.1rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 5px 20px rgba(255, 215, 0, 0.3);
    }
    button:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 30px rgba(255, 69, 0, 0.6);
      background: linear-gradient(45deg, var(--red-flame), var(--gold));
      color: #fff;
    }
    #pair {
      margin-top: 25px;
      font-weight: 600;
      word-break: break-all;
    }
    #copy {
      display: inline-block;
      margin-top: 15px;
      padding: 12px 30px;
      background: rgba(255,215,0,0.1);
      border: 1px dashed var(--gold);
      border-radius: 10px;
      color: var(--gold);
      font-size: 1.6rem;
      cursor: pointer;
      transition: all 0.3s ease;
      letter-spacing: 3px;
    }
    #copy:hover {
      background: rgba(255,215,0,0.25);
      box-shadow: 0 0 15px rgba(255, 215, 0, 0.2);
    }
    .copyright {
      position: absolute;
      bottom: 20px;
      width: 100%;
      text-align: center;
      font-family: 'Cinzel', serif;
      color: rgba(255, 255, 255, 0.4);
      font-size: 0.9rem;
      letter-spacing: 1px;
    }
  </style>
</head>
<body>
  <div class="background"></div>
  <div class="particles"></div>
  <div class="container">
    <div class="glass-box">
      <h2>Link Device</h2>
      <p class="subtitle">Enter your WhatsApp number with country code</p>
      <div class="input-group">
        <input type="number" id="number" placeholder="Eg: +94771234567">
        <button id="submit">Generate Code</button>
      </div>
      <div id="pair"></div>
    </div>
  </div>
  <div class="copyright">Copyright © 2026 Hansaka P. Fernando.</div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/axios/1.0.0-alpha.1/axios.min.js"></script>
  <script>
    let a = document.getElementById("pair");
    let b = document.getElementById("submit");
    let c = document.getElementById("number");
    async function Copy() {
      let text = document.getElementById("copy").innerText;
      let obj = document.getElementById("copy");
      await navigator.clipboard.writeText(obj.innerText.replace('CODE: ', ''));
      obj.innerText = "COPIED ✅";
      obj.style.color = "#00ff00";
      obj.style.borderColor = "#00ff00";
      setTimeout(() => {
        obj.innerText = text;
        obj.style.color = "var(--gold)";
        obj.style.borderColor = "var(--gold)";
      }, 1500);
    }
    b.addEventListener("click", async (e) => {
      e.preventDefault();
      if (!c.value) {
        a.innerHTML = '<span style="color:#ff4500;">❗ Enter your whatsapp number.</span>';
      } else if (c.value.replace(/[^0-9]/g, "").length < 11) {
        a.innerHTML = '<span style="color:#ff4500;">❌ Invalid number format.</span>';
      } else {
        const bc = c.value.replace(/[^0-9]/g, "");
        let bb = "";
        let bbc = "";
        const cc = bc.split('');
        cc.map(a => {
          bbc += a;
          if (bbc.length == 3 || bbc.length == 8) {
            bb += " " + a;
          } else {
            bb += a;
          }
        });
        c.type = "text";
        c.value = "+" + bb;
        b.innerText = "Generating...";
        b.style.opacity = "0.7";
        a.innerHTML = '<span style="color:var(--gold);">Summoning the code... ⏳</span>';
        
        try {
          let { data } = await axios("/code?number=" + bc);
          let code = data.code || "Service Unavailable";
          a.innerHTML = `<div id="copy" onclick="Copy()">CODE: <span>${code}</span></div>`;
        } catch(err) {
          a.innerHTML = '<span style="color:#ff4500;">❌ Network Error generating code.</span>';
        } finally {
          b.innerText = "Generate Code";
          b.style.opacity = "1";
        }
      }
    });
  </script>
</body>
</html>
